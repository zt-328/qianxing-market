<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陕西前星科技 — 市场活动中心</title>
<style>
:root{--primary:#FF6A00;--primary-light:#FFF0E5;--primary-dark:#E05E00;--bg:#F5F6F8;--sidebar-bg:#1A1A2E;--sidebar-text:#B0B3C1;--sidebar-active:#FFFFFF;--sidebar-hover:#252540;--sidebar-group:#6B6F80;--card-bg:#FFFFFF;--border:#E8E9EC;--text:#2D2F3A;--text-secondary:#6B6F80;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.sidebar{width:260px;min-width:260px;height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;overflow-y:auto;z-index:100}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header .logo{font-size:17px;font-weight:600;color:#fff;letter-spacing:.5px}
.sidebar-header .subtitle{font-size:12px;color:var(--sidebar-text);margin-top:4px}
.nav-group{margin-bottom:4px}
.nav-group-label{font-size:11px;font-weight:500;color:var(--sidebar-group);text-transform:uppercase;letter-spacing:.8px;padding:16px 20px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--sidebar-text);font-size:14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;text-decoration:none;user-select:none}
.nav-item:hover{background:var(--sidebar-hover);color:#D0D3DD}
.nav-item.active{background:rgba(255,106,0,.12);color:var(--sidebar-active);border-left-color:var(--primary);font-weight:500}
.nav-item .icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sidebar-login{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.login-btn{width:100%;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--sidebar-text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.login-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.user-info{font-size:13px;color:var(--sidebar-text);text-align:center}
.user-info .role{color:var(--primary);font-weight:500}
.logout-link{font-size:12px;color:var(--sidebar-text);cursor:pointer;margin-top:6px;display:inline-block}
.logout-link:hover{color:#e06060}
.main{flex:1;overflow-y:auto;padding:32px 36px}
.page-title{font-size:22px;font-weight:600;margin-bottom:8px}
.page-desc{font-size:14px;color:var(--text-secondary);margin-bottom:28px}
.admin-indicator{font-size:12px;color:var(--primary);background:var(--primary-light);padding:4px 10px;border-radius:12px;font-weight:500}
.status-bar{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.status-card{background:var(--card-bg);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);flex:1;min-width:180px;display:flex;flex-direction:column;gap:6px}
.status-card .label{font-size:13px;color:var(--text-secondary)}
.status-card .value{font-size:28px;font-weight:700;color:var(--primary)}
.status-card.upcoming .value{color:#3D6F94}
.status-card.completed .value{color:#6F8854}
.section-title{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:18px;background:var(--primary);border-radius:2px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:32px}
.card{background:var(--card-bg);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .2s;position:relative}
.card.clickable{cursor:pointer}
.card.clickable:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);border-color:var(--primary)}
.card.clickable::after{content:'\2192';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:16px;color:#ccc;transition:color .2s}
.card.clickable:hover::after{color:var(--primary)}
.card .tag{display:inline-block;font-size:12px;font-weight:500;padding:3px 10px;border-radius:12px;margin-bottom:10px;margin-right:6px}
.tag-active{background:#FFF0E5;color:var(--primary)}
.tag-upcoming{background:#E9F1F6;color:#3D6F94}
.tag-done{background:#EDF2E8;color:#6F8854}
.card h3{font-size:15px;font-weight:600;margin-bottom:6px;padding-right:24px}
.card p{font-size:13px;color:var(--text-secondary);line-height:1.6}
.card .meta{font-size:12px;color:var(--text-secondary);margin-top:12px;display:flex;gap:16px;flex-wrap:wrap}
.page-section{display:none}
.page-section.active{display:block}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.placeholder .icon-large{font-size:48px;margin-bottom:16px;opacity:.4}
.placeholder h2{font-size:20px;margin-bottom:8px}
.placeholder p{font-size:14px;color:var(--text-secondary);max-width:400px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-small{padding:4px 10px;font-size:12px}
.edit-row{margin-bottom:12px}
.edit-row label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:4px}
.cat-select{padding:4px 8px;border-radius:4px;border:1px solid var(--border);font-size:13px;background:var(--card-bg);cursor:pointer}
.no-invite{font-size:13px;color:var(--text-secondary);font-style:italic}
.invite-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.invite-section .label{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
.admin-edit-btn{position:absolute;right:44px;top:18px;width:26px;height:26px;border:none;background:var(--bg);border-radius:4px;cursor:pointer;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;transition:all .15s}
.admin-edit-btn:hover{background:var(--primary-light);color:var(--primary)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card-bg);border-radius:12px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border:none;background:var(--bg);border-radius:50%;font-size:18px;cursor:pointer;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:#e0e0e0;color:var(--text)}
.modal-body{padding:16px 24px 24px}
.info-row{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;font-size:14px}
.info-label{color:var(--text-secondary);min-width:60px;flex-shrink:0}
.info-value{color:var(--text)}
.login-page{display:flex;width:100vw;height:100vh;background:linear-gradient(135deg,#1A1A2E 0%,#2D2F4E 100%);align-items:center;justify-content:center;flex-direction:column}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.login-card .login-logo{font-size:22px;font-weight:700;color:#1A1A2E;margin-bottom:4px}
.login-card .login-sub{font-size:13px;color:var(--text-secondary);margin-bottom:32px}
.login-card input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-size:15px;outline:none;margin-bottom:12px;transition:border-color .2s}
.login-card input:focus{border-color:var(--primary)}
.login-card .login-err{font-size:13px;color:#e06060;display:none;margin-bottom:12px}
.app-container{display:none;width:100%;height:100%}
.app-container.active{display:flex}
.cal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-month-btn{padding:6px 16px;border:1px solid var(--border);border-radius:20px;background:var(--card-bg);font-size:14px;cursor:pointer;color:var(--text);transition:all .15s}
.cal-month-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.cal-month-btn:hover:not(.active){border-color:var(--primary);color:var(--primary)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cal-dow{background:var(--card-bg);text-align:center;padding:10px 0;font-size:12px;font-weight:600;color:var(--text-secondary)}
.cal-dow.weekend{color:#c04040}
.cal-day{background:var(--card-bg);min-height:100px;padding:6px;position:relative}
.cal-day.empty{background:#f8f9fb}
.cal-day .day-num{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.cal-event{display:block;font-size:11px;padding:2px 6px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.5;transition:opacity .15s}
.cal-event:hover{opacity:.8}
.cal-event.no-click{cursor:default;opacity:.6}
.cal-event.no-click:hover{opacity:.6}
.cal-more{font-size:11px;color:var(--text-secondary);cursor:pointer;padding:2px 6px}
.type-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
.type-card{background:var(--card-bg);border-radius:12px;padding:36px 24px;box-shadow:var(--shadow);border:2px solid var(--border);cursor:pointer;text-align:center;transition:all .2s}
.type-card:hover{border-color:var(--primary);box-shadow:0 6px 24px rgba(255,106,0,.12);transform:translateY(-2px)}
.type-card .tc-icon{width:56px;height:56px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.type-card .tc-icon svg{width:48px;height:48px}
.type-card h3{font-size:17px;font-weight:700;margin-bottom:6px}
.type-card .tc-sub{font-size:13px;color:var(--text-secondary)}
.type-detail{display:none}
.type-detail.active{display:block}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--primary);cursor:pointer;margin-bottom:20px;font-weight:500}
.month-divider{margin:32px 0 20px;padding-top:24px;border-top:2px solid var(--border);display:flex;align-items:baseline}
.mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;width:36px;height:36px;background:var(--sidebar-bg);border:none;border-radius:6px;color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center}
@media(max-width:768px){
.sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);transition:transform .25s}
.sidebar.open{transform:translateX(0)}
.mobile-toggle{display:flex}
.main{padding:20px 16px;padding-top:56px}
.card-grid{grid-template-columns:1fr}
.status-bar{flex-direction:column}
.cal-day{min-height:70px;padding:4px}
.cal-event{font-size:10px;padding:1px 4px}
.type-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Login Page -->
<div class="login-page" id="login-page">
<div class="login-card">
<div class="login-logo">陕西前星科技</div>
<div class="login-sub">市场活动中心</div>
<input type="text" id="login-name" placeholder="请输入姓名">
<input type="password" id="login-pwd" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
<p class="login-err" id="login-err"></p>
<button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:15px" onclick="doLogin()">登 录</button>
</div>
</div>

<!-- App -->
<div class="app-container" id="app-container">
<button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>
<aside class="sidebar" id="sidebar">
<div class="sidebar-header"><div class="logo">陕西前星科技</div><div class="subtitle">市场活动中心</div></div>
<nav class="sidebar-nav"></nav>
<div class="sidebar-login" id="sidebar-login"></div>
</aside>
<div id="overlay" onclick="closeSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99"></div>
<main class="main" id="main-content">
<section class="page-section active" id="page-schedule"></section>
<section class="page-section" id="page-activity-types"></section>
<section class="page-section" id="page-sop"><div class="placeholder"><div class="icon-large">&#128221;</div><h2>活动邀约SOP</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-scripts"><div class="placeholder"><div class="icon-large">&#128172;</div><h2>邀约话术库</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-cases"><div class="placeholder"><div class="icon-large">&#11088;</div><h2>商家案例</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-speakers"><div class="placeholder"><div class="icon-large">&#128100;</div><h2>讲师库</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-materials"><div class="placeholder"><div class="icon-large">&#128193;</div><h2>活动素材</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-star-intro"><div class="placeholder"><div class="icon-large">&#127775;</div><h2>销售星介绍 &amp; 加入流程</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-star-learn"><div class="placeholder"><div class="icon-large">&#128218;</div><h2>销售星学习资料</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-star-sop"><div class="placeholder"><div class="icon-large">&#128203;</div><h2>销售星工作SOP</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-dashboard"><div class="placeholder"><div class="icon-large">&#128200;</div><h2>活动数据看板</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-followup"><div class="placeholder"><div class="icon-large">&#128101;</div><h2>客户跟进</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-incentive"><div class="placeholder"><div class="icon-large">&#127942;</div><h2>激励政策</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-reports"><div class="placeholder"><div class="icon-large">&#127881;</div><h2>战报 / 捷报</h2><p>待内容填充</p></div></section>
<section class="page-section" id="page-signing"><div class="placeholder"><div class="icon-large">&#128176;</div><h2>新签明细</h2><p>待内容填充</p></div></section>
</main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
<div class="modal">
<div class="modal-header"><h2 id="modal-title"></h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
<div class="modal-body" id="modal-body"></div>
</div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal">
<div class="modal">
<div class="modal-header"><h2>添加活动</h2><button class="modal-close" onclick="closeAddModal()">&times;</button></div>
<div class="modal-body" id="add-body"></div>
</div>
</div>

<script>
// ===== DATA =====
var USERS = [
{name:'王帅飞',pwd:'123456',role:'客户经理'},{name:'寇智星',pwd:'123456',role:'客户经理'},{name:'王庚毅',pwd:'123456',role:'客户经理'},{name:'田耀利',pwd:'123456',role:'客户经理'},{name:'吴贵琴',pwd:'123456',role:'客户经理'},{name:'李凌龙',pwd:'123456',role:'客户经理'},{name:'张伟',pwd:'123456',role:'客户经理'},{name:'王雪',pwd:'123456',role:'客户经理'},{name:'路路明',pwd:'123456',role:'客户经理'},{name:'王浩楠',pwd:'123456',role:'客户经理'},{name:'何俣岐',pwd:'123456',role:'客户经理'},{name:'来星驰',pwd:'123456',role:'客户经理'},{name:'李江樑',pwd:'123456',role:'客户经理'},{name:'段豪歌',pwd:'123456',role:'客户经理'},{name:'洪宇超',pwd:'123456',role:'客户经理'},{name:'缑李琳',pwd:'123456',role:'客户经理'},{name:'王维治',pwd:'123456',role:'客户经理'},{name:'安阳',pwd:'123456',role:'客户经理'},{name:'李悦',pwd:'123456',role:'客户经理'},{name:'程梦',pwd:'123456',role:'客户经理'},{name:'孟凡喆',pwd:'123456',role:'客户经理'},{name:'颉冠斌',pwd:'123456',role:'客户经理'},{name:'田晨泽',pwd:'123456',role:'客户经理'},{name:'王伟霞',pwd:'123456',role:'客户经理'},{name:'曹子亮',pwd:'123456',role:'客户经理'},{name:'杨鑫',pwd:'123456',role:'客户经理'},{name:'罗海荣',pwd:'123456',role:'客户经理'},{name:'张静',pwd:'123456',role:'管理员'},{name:'翟恬',pwd:'123456',role:'管理员'},{name:'杨蒙',pwd:'123456',role:'销售主管'},{name:'马旭伟',pwd:'123456',role:'销售主管'},{name:'董越',pwd:'123456',role:'销售主管'},{name:'雷明升',pwd:'123456',role:'销售主管'},{name:'姬媛',pwd:'123456',role:'运营主管'}
];

var CATS = { '新签活动': {bg:'#EDF2E8',c:'#5B9E6F'}, '育商活动': {bg:'#FFF5E8',c:'#E8A838'}, '付费活动': {bg:'#EAF0F8',c:'#4877B5'}, '内部会议': {bg:'#FFFDE8',c:'#B8A020'} };
var CAT_KEYS = Object.keys(CATS);
var ST = { ongoing:{cls:'tag-active',l:'进行中'}, upcoming:{cls:'tag-upcoming',l:'即将开始'}, done:{cls:'tag-done',l:'已完成'} };

var calendarMonth = 7;

// NAV items
var NAV_ITEMS = [
{group:'活动管理',items:[{id:'schedule',icon:'&#128197;',label:'活动排期'},{id:'activity-types',icon:'&#128204;',label:'活动类型'},{id:'sop',icon:'&#128221;',label:'活动邀约SOP'},{id:'scripts',icon:'&#128172;',label:'邀约话术库'}]},
{group:'赋能资源',items:[{id:'cases',icon:'&#11088;',label:'商家案例'},{id:'speakers',icon:'&#128100;',label:'讲师库'},{id:'materials',icon:'&#128193;',label:'活动素材'}]},
{group:'销售星 · 抖音获客',items:[{id:'star-intro',icon:'&#127775;',label:'销售星介绍 & 加入流程'},{id:'star-learn',icon:'&#128218;',label:'销售星学习资料'},{id:'star-sop',icon:'&#128203;',label:'销售星工作SOP'}]},
{group:'数据与激励',items:[{id:'dashboard',icon:'&#128200;',label:'活动数据看板'},{id:'followup',icon:'&#128101;',label:'客户跟进'},{id:'incentive',icon:'&#127942;',label:'激励政策'},{id:'reports',icon:'&#127881;',label:'战报/捷报'}]},
{group:'业绩追踪',items:[{id:'signing',icon:'&#128176;',label:'新签明细'}]}
];

// ===== AUTH =====
function getU(){var u=sessionStorage.getItem('qx_u');return u?JSON.parse(u):null}
function setU(u){sessionStorage.setItem('qx_u',u?JSON.stringify(u):'')}
function isAdmin(){var u=getU();return u&&(u.role==='管理员'||u.role==='运营主管')}

function doLogin(){
var n=byId('login-name').value.trim(),p=byId('login-pwd').value,err=byId('login-err');
if(!n){err.textContent='请输入姓名';err.style.display='block';return}
if(!p){err.textContent='请输入密码';err.style.display='block';return}
var u=USERS.find(function(x){return x.name===n});
if(!u){err.textContent='姓名不存在';err.style.display='block';return}
if(u.pwd!==p){err.textContent='密码错误';err.style.display='block';return}
setU(u);byId('login-page').style.display='none';byId('app-container').classList.add('active');
err.style.display='none';byId('login-name').value='';byId('login-pwd').value='';
buildNav();renderLoginUI();renderSchedule();
}
function doLogout(){setU(null);byId('login-page').style.display='flex';byId('app-container').classList.remove('active')}

function renderLoginUI(){
var el=byId('sidebar-login'),u=getU();
el.innerHTML=u?'<div class="user-info"><span class="role">'+e(u.name)+'</span> · '+e(u.role)+'<br><span class="logout-link" onclick="doLogout()">退出登录</span></div>':'';
}

function buildNav(){
var nav=document.querySelector('.sidebar-nav');
var h='';
NAV_ITEMS.forEach(function(g){
h+='<div class="nav-group"><div class="nav-group-label">'+g.group+'</div>';
g.items.forEach(function(it){

// ===== CALENDAR =====
function parseDates(a){
var r=[],d=a.date;
var s=d.match(/^(\d+)月(\d+)日$/);if(s){r.push({m:parseInt(s[1]),d:parseInt(s[2])});return r}
var ra=d.match(/^(\d+)月(\d+)日\s*[-–]\s*(\d+)日$/);if(ra){var m=parseInt(ra[1]),f=parseInt(ra[2]),t=parseInt(ra[3]);for(var i=f;i<=t;i++)r.push({m:m,d:i});return r}
return r;
}

h+='</div>';

h+='<div class="cal-header">';
[7,8,9].forEach(function(m){h+='<button class="cal-month-btn'+(calendarMonth===m?' active':'')+'" onclick="calMonth='+m+';renderSchedule()">'+m+'月</button>'});

h+='</div>';

var dim=calendarMonth===7?31:(calendarMonth===8?31:30);

var dows=['日','一','二','三','四','五','六'];
h+='<div class="cal-grid">';
dows.forEach(function(d,i){h+='<div class="cal-dow'+(i===0||i===6?' weekend':'')+'">'+d+'</div>'});
var dm={};for(var d=1;d<=dim;d++)dm[d]=[];
activities.forEach(function(a){parseDates(a).forEach(function(dd){if(dd.m===calendarMonth&&dm[dd.d])dm[dd.d].push(a)})});

h+='<div class="cal-day"><div class="day-num">'+d+'</div>';

function showTD(type){byId('type-select').style.display='none';document.querySelectorAll('.type-detail').forEach(function(e){e.classList.remove('active')});var t=byId('td-'+type);if(t)t.classList.add('active');renderTList(type)}
function showTS(){byId('type-select').style.display='grid';document.querySelectorAll('.type-detail').forEach(function(e){e.classList.remove('active')})}
function renderTList(type){
var list=activities.filter(function(a){return getTG(a)===type}),c=byId('list-'+type);if(!c)return;
var h='';
if(list.length===0){h='<p style="font-size:13px;color:var(--text-secondary);padding:20px 0">暂无近期活动</p>'}
else list.forEach(function(a){var isInt=a.cat==='内部会议',cl=a.cat!=='内部会议',cs=CATS[a.cat],st=ST[a.status];h+='<div class="card'+(cl?' clickable':'')+'"'+(cl?' onclick="openAct('+a.id+')"':'')+'><span class="tag '+st.cls+'">'+st.l+'</span><span class="tag" style="background:'+cs.bg+';color:'+cs.c+'">'+a.cat+'</span><h3>'+e(a.title)+'</h3><p>'+e(a.date)+'</p></div>'});
c.innerHTML=h;
}

// ===== HELPERS =====
function byId(x){return document.getElementById(x)}
function e(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ===== SIDEBAR =====
function toggleSidebar(){var s=byId('sidebar'),o=byId('overlay');if(s.classList.contains('open')){s.classList.remove('open');o.style.display='none'}else{s.classList.add('open');o.style.display='block'}}
function closeSidebar(){byId('sidebar').classList.remove('open');byId('overlay').style.display='none'}
